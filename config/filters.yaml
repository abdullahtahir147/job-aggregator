# ─────────────────────────────────────────────────────────────
# Job Scoring Filters
# ─────────────────────────────────────────────────────────────
# Scoring rules:
#   +3  per matching include_titles phrase in the job title
#   -5  per matching exclude_titles phrase in the job title
#   +1  per include_keyword found in title + description
#   -2  per exclude_keyword found in title + description
#
# All matching is case-insensitive.
# ─────────────────────────────────────────────────────────────

include_titles:
  - "product analyst"
  - "growth analyst"
  - "marketing analyst"
  - "marketing scientist"
  - "marketing data"
  - "product data scientist"
  - "data scientist"
  - "data analyst"
  - "analytics engineer"
  # Forward-deployed / Applied AI
  - "forward deployed"
  - "forward-deployed"
  - "applied ai"
  - "applied scientist"
  - "applied machine learning"
  # Solutions / Implementation
  - "solutions engineer"
  - "ai solutions"
  - "solutions architect"
  - "ai architect"
  - "implementation engineer"
  - "deployment engineer"
  # DevRel
  - "developer advocate"
  - "devrel"
  - "developer relations"
  - "technical evangelist"
  - "technology evangelist"
  # Product / Growth analytics
  - "product analytics"
  - "growth data scientist"
  - "experimentation"

exclude_titles:
  - "ml engineer"
  - "platform"
  - "research scientist"
  - "computer vision"
  - "nlp"
  - "quant"
  - "staff engineer"
  - "principal engineer"
